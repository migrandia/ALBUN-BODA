<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Nuestra Boda: J & M</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>

    <style>
        :root {
            --primario: #1a2a6c; 
            --acento: #b2bec3; 
            --texto: #2d3436;
            --blanco-puro: #ffffff;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0;
            background-color: #f4f7f6;
            color: var(--texto);
            text-align: center;
        }

        .header-album {
            background: linear-gradient(-45deg, #1a2a6c, #2a4858, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 60px 20px;
            border-bottom: 5px solid var(--acento);
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .foto-portada {
            width: 160px; height: 160px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 4px solid var(--blanco-puro);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .foto-portada img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-family: 'Great Vibes', cursive; font-size: 3.8rem; color: var(--blanco-puro); margin: 0; cursor: pointer; user-select: none; }

        /* PANEL DE ANFITRIONA (OCULTO) */
        #admin-panel {
            display: none;
            background: #2d3436; color: white;
            padding: 20px; margin: 20px;
            border-radius: 15px; border: 2px dashed var(--acento);
        }

        .btn-admin {
            background: #e17055; color: white; border: none;
            padding: 10px; margin: 5px; border-radius: 8px; cursor: pointer;
        }

        /* SECCIÓN MENSAJES */
        .chat-container {
            background: white;
            margin: -30px 15px 20px;
            padding: 30px 15px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .color-selector { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid #ddd; }

        .input-box {
            background: #f8f9fa; padding: 20px; border-radius: 20px;
            max-width: 400px; margin: 0 auto; border: 1px solid #eee;
        }
        .input-box input, .input-box textarea {
            width: 95%; border: none; background: transparent; 
            font-family: 'Montserrat'; outline: none; margin-bottom: 10px; font-size: 1rem;
        }

        .btn-enviar {
            background: var(--primario); color: white; border: none;
            padding: 12px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; width: 100%;
        }

        #muro-mensajes {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 15px; margin-top: 30px; max-height: 500px; overflow-y: auto;
        }

        .sticker {
            width: 140px; min-height: 140px; padding: 15px;
            text-align: left; box-shadow: 5px 5px 15px rgba(0,0,0,0.08);
            font-size: 0.85rem; border-radius: 2px;
        }

        /* GALERÍA */
        .gallery-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; padding: 15px; margin-bottom: 120px;
        }
        .photo-item { aspect-ratio: 1/1; background: #dfe6e9; border-radius: 8px; overflow: hidden; position: relative; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        .tag { 
            position: absolute; bottom: 0; width: 100%; 
            background: rgba(26, 42, 108, 0.8); color: white; 
            font-size: 0.65rem; padding: 5px 0;
        }

        .float-btn { position: fixed; bottom: 30px; width: 100%; z-index: 1000; }
        .btn-upload {
            background: var(--primario); color: white; border: 2px solid white;
            padding: 18px 40px; border-radius: 50px; font-weight: bold;
            box-shadow: 0 8px 20px rgba(26, 42, 108, 0.4);
            cursor: pointer; font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="header-album">
        <div class="foto-portada">
            <img src="https://images.pexels.com/photos/2253870/pexels-photo-2253870.jpeg?auto=compress&cs=tinysrgb&w=400">
        </div>
        <h1 onclick="detectarTripleClic()">Juan & María</h1>
        <p style="letter-spacing: 4px; font-size: 0.8rem; font-weight: bold;">NUESTRA BODA • 2026</p>
    </div>

    <div id="admin-panel">
        <h3>Panel de Control (Anfitriona)</h3>
        <button class="btn-admin" onclick="descargarTodasLasFotos()">📥 Descargar todas las fotos</button>
        <button class="btn-admin" onclick="borrarTodoElChat()" style="background:red;">🗑️ Borrar mensajes (Limpiar Excel)</button>
        <p style="font-size:0.7rem;">Haz clic de nuevo en el nombre para ocultar.</p>
    </div>

    <div class="chat-container">
        <div class="color-selector">
            <div class="dot" onclick="setCol('#ffffff')" style="background:#ffffff;"></div>
            <div class="dot" onclick="setCol('#f1f2f6')" style="background:#f1f2f6;"></div>
            <div class="dot" onclick="setCol('#dfe6e9')" style="background:#dfe6e9;"></div>
            <div class="dot" onclick="setCol('#ced6e0')" style="background:#ced6e0;"></div>
        </div>

        <div class="input-box" id="caja">
            <input type="text" id="n" placeholder="Tu nombre...">
            <textarea id="m" placeholder="Escribe tu dedicatoria aquí..."></textarea>
            <button class="btn-enviar" onclick="enviar()">PUBLICAR DESEO</button>
        </div>

        <div id="muro-mensajes"></div>
    </div>

    <h2 style="font-family: 'Great Vibes'; font-size: 3rem; color: var(--primario);">Momentos Compartidos</h2>
    <div class="gallery-grid" id="galeria"></div>

    <div class="float-btn">
        <button id="upload_widget" class="btn-upload">📸 SUBIR MOMENTO</button>
    </div>

    <script>
        const API_ID = "w2rngy2vj0dv2"; 
        const cloudName = "dkoaxjahe";
        const uploadPreset = "ALBUN TEST";
        const eventTag = "boda_juan_maria_2026"; 

        let col = "#ffffff";
        let clics = 0;

        function setCol(c) { col = c; document.getElementById('caja').style.backgroundColor = c; }

        // --- FUNCIÓN TRIPLE CLIC ---
        function detectarTripleClic() {
            clics++;
            if (clics === 3) {
                const panel = document.getElementById('admin-panel');
                panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
                clics = 0;
            }
            setTimeout(() => { clics = 0; }, 1000);
        }

        // --- DESCARGAR FOTOS ---
        async function descargarTodasLasFotos() {
            const res = await fetch(`https://res.cloudinary.com/${cloudName}/image/list/${eventTag}.json`);
            const data = await res.json();
            data.resources.forEach((img, index) => {
                const link = document.createElement('a');
                link.href = `https://res.cloudinary.com/${cloudName}/image/upload/${img.public_id}.${img.format}`;
                link.download = `foto_boda_${index}`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });
        }

        // --- BORRAR TODO EL CHAT (Limpiar Excel) ---
        async function borrarTodoElChat() {
            if(confirm("¿Seguro que quieres borrar TODOS los mensajes?")){
                const pass = prompt("Contraseña de administrador:");
                if(pass === "1234") { // Cambia esta contraseña si quieres
                    await fetch(`https://sheetdb.io/api/v1/${API_ID}/all`, { method: 'DELETE' });
                    location.reload();
                } else { alert("Error de acceso"); }
            }
        }

        async function enviar() {
            const nom = document.getElementById('n').value;
            const msg = document.getElementById('m').value;
            if(!nom || !msg) return alert("Por favor, escribe tu nombre y un mensaje.");
            const btn = document.querySelector('.btn-enviar');
            btn.innerText = "Publicando...";
            try {
                await fetch(`https://sheetdb.io/api/v1/${API_ID}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({data: [{"Nombre": nom, "Mensaje": msg, "Color": col}]})
                });
                document.getElementById('m').value = "";
                cargarChat(); 
            } catch(e) { alert("Error al enviar"); }
            btn.innerText = "PUBLICAR DESEO";
        }

        async function cargarChat() {
            try {
                const res = await fetch(`https://sheetdb.io/api/v1/${API_ID}`);
                const data = await res.json();
                const muro = document.getElementById('muro-mensajes');
                muro.innerHTML = "";
                data.reverse().forEach(d => {
                    const s = document.createElement('div');
                    s.className = "sticker";
                    s.style.backgroundColor = d.Color || "#ffffff";
                    s.style.border = "1px solid #eee";
                    s.style.transform = `rotate(${Math.random()*4-2}deg)`;
                    s.innerHTML = `<strong>${d.Nombre}:</strong><p>${d.Mensaje}</p>`;
                    muro.appendChild(s);
                });
            } catch(e) { console.log("Error chat"); }
        }

        async function cargarFotos() {
            try {
                const res = await fetch(`https://res.cloudinary.com/${cloudName}/image/list/${eventTag}.json?v=${Date.now()}`);
                const data = await res.json();
                const gal = document.getElementById('galeria');
                gal.innerHTML = "";
                data.resources.forEach(img => {
                    let uploader = "Invitado";
                    if (img.context && img.context.custom && img.context.custom.uploader) {
                        uploader = img.context.custom.uploader;
                    }
                    const url = `https://res.cloudinary.com/${cloudName}/image/upload/w_500,c_fill/${img.public_id}.${img.format}`;
                    const div = document.createElement('div');
                    div.className = 'photo-item';
                    div.innerHTML = `<img src="${url}" onclick="window.open('${url.replace('w_500,c_fill/','')}')"><div class="tag">De: ${uploader}</div>`;
                    gal.appendChild(div);
                });
            } catch(e) { console.log("Error galería"); }
        }

        const widget = cloudinary.createUploadWidget({
            cloudName: cloudName, 
            uploadPreset: uploadPreset, 
            tags: [eventTag],
            prepareUploadParams: (cb, params) => {
                const n = prompt("¿Quién envía esta foto?") || "Anónimo";
                cb({ context: `uploader=${n}` });
            }
        }, (err, res) => { 
            if(res.event === "success") setTimeout(cargarFotos, 2000); 
        });

        document.getElementById("upload_widget").onclick = () => widget.open();

        window.onload = () => { 
            cargarChat(); 
            cargarFotos(); 
            setInterval(cargarChat, 10000);
        };
    </script>
</body>
</html>
